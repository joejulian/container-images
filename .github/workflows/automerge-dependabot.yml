name: Automerge Dependabot

on:
  pull_request_target:
    types:
      - opened
      - labeled
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to auto-merge. Leave empty to scan open Dependabot action PRs.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for GitHub Actions updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          enable_automerge() {
            local pr_number="$1"
            local pr_json

            pr_json="$(gh pr view "${pr_number}" --json number,author,labels,isCrossRepository)"

            if [[ "$(jq -r '.author.login' <<< "${pr_json}")" != "dependabot[bot]" ]]; then
              return 0
            fi
            if [[ "$(jq -r '.isCrossRepository' <<< "${pr_json}")" == "true" ]]; then
              return 0
            fi
            if ! jq -e '.labels | any(.name == "dependencies")' <<< "${pr_json}" >/dev/null; then
              return 0
            fi
            if ! jq -e '.labels | any(.name == "github_actions")' <<< "${pr_json}" >/dev/null; then
              return 0
            fi

            gh pr merge "${pr_number}" --auto --squash
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.pr_number }}" ]]; then
              enable_automerge "${{ inputs.pr_number }}"
              exit 0
            fi

            while IFS= read -r pr_number; do
              enable_automerge "${pr_number}"
            done < <(
              gh pr list --search "is:open author:app/dependabot" --json number \
                --jq '.[] | .number'
            )
            exit 0
          fi

          enable_automerge "${{ github.event.pull_request.number }}"
