name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "19 6 * * *"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    needs:
      - matrix
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install crane
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go
          go install github.com/google/go-containerregistry/cmd/crane@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"
      - run: chmod +x scripts/*.sh
      - name: Publish build image
        if: matrix.type == 'build'
        run: ./scripts/publish-build.sh "${{ matrix.dir }}"
      - name: Publish mirrored image
        if: matrix.type == 'mirror'
        run: ./scripts/publish-mirror.sh "${{ matrix.dir }}"

  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: |
          chmod +x scripts/*.sh
          printf 'matrix=%s\n' "$(./scripts/render-matrix.sh all)" >> "${GITHUB_OUTPUT}"

