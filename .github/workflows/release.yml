name: Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: "19 5 * * *"
  workflow_dispatch:
    inputs:
      scope:
        description: Matrix scope to publish
        required: false
        default: changed
        type: choice
        options:
          - changed
          - all
          - build

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: needs.matrix.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    needs:
      - matrix
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go skopeo
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: azure/setup-kubectl@v5
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: chmod +x scripts/*.sh
      - id: has-tests
        run: |
          if [[ -d "${{ matrix.dir }}/tests/kuttl" ]]; then
            printf 'present=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'present=false\n' >> "${GITHUB_OUTPUT}"
          fi
      - name: Validate build image
        if: matrix.type == 'build'
        run: ./scripts/build-local.sh "${{ matrix.dir }}"
      - name: Validate mirror source
        if: matrix.type == 'mirror'
        run: |
          go install github.com/google/go-containerregistry/cmd/crane@latest
          export PATH="${PATH}:${HOME}/go/bin"
          while IFS= read -r tag; do
            crane digest "${{ matrix.sourceImage }}:${tag}" >/dev/null
          done < <(jq -r '.tags[]' "${{ matrix.dir }}/image.json")
          for tag in $(jq -r '.tags[] | select(length > 0)' "${{ matrix.dir }}/image.json"); do
            manifest="$(crane manifest "${{ matrix.sourceImage }}:${tag}")"
            while IFS= read -r platform; do
              jq -e --arg platform "${platform}" '
                ($platform | split("/")) as $parts
                | any(.manifests[]?.platform?;
                    .os == $parts[0] and
                    .architecture == $parts[1] and
                    (($parts | length) < 3 or .variant == $parts[2]))
              ' <<< "${manifest}" >/dev/null
            done < <(jq -r '.platforms[]? // empty' "${{ matrix.dir }}/image.json")
          done
      - name: Install KUTTL toolchain
        if: steps.has-tests.outputs.present == 'true'
        run: |
          go install sigs.k8s.io/kind@v0.29.0
          go install github.com/kudobuilder/kuttl/cmd/kubectl-kuttl@latest
          export PATH="${PATH}:${HOME}/go/bin"
          kind create cluster --wait 120s
      - name: Load image into kind
        if: steps.has-tests.outputs.present == 'true' && matrix.type == 'build'
        run: |
          export PATH="${PATH}:${HOME}/go/bin"
          kind load docker-image "local/${{ matrix.name }}:ci"
      - name: Run KUTTL tests
        if: steps.has-tests.outputs.present == 'true'
        run: |
          export PATH="${PATH}:${HOME}/go/bin"
          ./scripts/run-kuttl.sh "${{ matrix.dir }}"
      - name: Publish build image
        if: matrix.type == 'build'
        run: ./scripts/publish-build.sh "${{ matrix.dir }}"
      - name: Publish mirrored image
        if: matrix.type == 'mirror'
        run: ./scripts/publish-mirror.sh "${{ matrix.dir }}"
      - name: Delete kind cluster
        if: always() && steps.has-tests.outputs.present == 'true'
        run: |
          export PATH="${PATH}:${HOME}/go/bin"
          kind delete cluster

  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: matrix
        run: |
          chmod +x scripts/*.sh
          mode=changed
          base_ref="${{ github.event.before }}"
          head_ref="${GITHUB_SHA}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.scope }}"
            if [[ "${mode}" == "changed" ]]; then
              base_ref="$(git rev-parse HEAD^)"
            fi
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            mode=build
          fi
          {
            printf 'matrix<<EOF\n'
            matrix_json="$(./scripts/render-matrix.sh "${mode}" "${base_ref}" "${head_ref}")"
            printf '%s\n' "${matrix_json}"
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"
          printf 'count=%s\n' "$(jq '.include | length' <<< "${matrix_json}")" >> "${GITHUB_OUTPUT}"
