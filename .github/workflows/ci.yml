name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: |
          chmod +x scripts/*.sh
          {
            printf 'matrix<<EOF\n'
            ./scripts/render-matrix.sh all
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/*.sh
      - run: ./scripts/lint.sh

  validate:
    runs-on: ubuntu-latest
    needs:
      - matrix
      - lint
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/*.sh
      - uses: docker/setup-buildx-action@v3
      - name: Validate build image
        if: matrix.type == 'build'
        run: ./scripts/build-local.sh "${{ matrix.dir }}"
      - name: Validate mirror source
        if: matrix.type == 'mirror'
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go
          go install github.com/google/go-containerregistry/cmd/crane@latest
          export PATH="${PATH}:${HOME}/go/bin"
          while IFS= read -r tag; do
            crane digest "${{ matrix.sourceImage }}:${tag}" >/dev/null
          done < <(jq -r '.tags[]' "${{ matrix.dir }}/image.json")
