name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: |
          chmod +x scripts/*.sh
          mode=all
          base_ref=
          head_ref="${GITHUB_SHA}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mode=changed
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            mode=changed
            base_ref="${{ github.event.before }}"
          fi
          {
            printf 'matrix<<EOF\n'
            matrix_json="$(./scripts/render-matrix.sh "${mode}" "${base_ref}" "${head_ref}")"
            printf '%s\n' "${matrix_json}"
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"
          printf 'count=%s\n' "$(jq '.include | length' <<< "${matrix_json}")" >> "${GITHUB_OUTPUT}"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/*.sh
      - run: ./scripts/lint.sh

  validate:
    runs-on: ubuntu-latest
    if: needs.matrix.outputs.count != '0'
    needs:
      - matrix
      - lint
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/*.sh
      - uses: docker/setup-buildx-action@v3
      - name: Validate build image
        if: matrix.type == 'build'
        run: ./scripts/build-local.sh "${{ matrix.dir }}"
      - name: Validate mirror source
        if: matrix.type == 'mirror'
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go
          go install github.com/google/go-containerregistry/cmd/crane@latest
          export PATH="${PATH}:${HOME}/go/bin"
          while IFS= read -r tag; do
            crane digest "${{ matrix.sourceImage }}:${tag}" >/dev/null
          done < <(jq -r '.tags[]' "${{ matrix.dir }}/image.json")

  kuttl:
    runs-on: ubuntu-latest
    if: needs.matrix.outputs.count != '0'
    needs:
      - matrix
      - lint
      - validate
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/*.sh
      - id: has-tests
        run: |
          if [[ -d "${{ matrix.dir }}/tests/kuttl" ]]; then
            printf 'present=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'present=false\n' >> "${GITHUB_OUTPUT}"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.has-tests.outputs.present == 'true' && matrix.type == 'build'
      - uses: azure/setup-kubectl@v4
        if: steps.has-tests.outputs.present == 'true'
      - name: Build local image for tests
        if: steps.has-tests.outputs.present == 'true' && matrix.type == 'build'
        run: ./scripts/build-local.sh "${{ matrix.dir }}"
      - name: Install KUTTL toolchain
        if: steps.has-tests.outputs.present == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go
          go install sigs.k8s.io/kind@v0.29.0
          go install github.com/kudobuilder/kuttl/cmd/kubectl-kuttl@latest
          export PATH="${PATH}:${HOME}/go/bin"
          kind create cluster --wait 120s
      - name: Load image into kind
        if: steps.has-tests.outputs.present == 'true' && matrix.type == 'build'
        run: |
          export PATH="${PATH}:${HOME}/go/bin"
          kind load docker-image "local/${{ matrix.name }}:ci"
      - name: Run KUTTL tests
        if: steps.has-tests.outputs.present == 'true'
        run: |
          export PATH="${PATH}:${HOME}/go/bin"
          ./scripts/run-kuttl.sh "${{ matrix.dir }}"
      - name: Delete kind cluster
        if: always() && steps.has-tests.outputs.present == 'true'
        run: |
          export PATH="${PATH}:${HOME}/go/bin"
          kind delete cluster
